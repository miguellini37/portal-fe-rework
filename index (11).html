<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }

    function filterJobs() {
      const majorFilter = document.getElementById('filter-major').value;
      const locationFilter = document.getElementById('filter-location').value;
      const industryFilter = document.getElementById('filter-industry').value;

      const filteredJobs = jobs.filter(job => {
        const matchesMajor = !majorFilter || job.major.includes(majorFilter);
        const matchesLocation = !locationFilter || job.location === locationFilter;
        const matchesIndustry = !industryFilter || job.industry === industryFilter;
        return matchesMajor && matchesLocation && matchesIndustry;
      });

      renderJobs(filteredJobs);
    }

    function resetFilters() {
      document.getElementById('filter-major').value = '';
      document.getElementById('filter-location').value = '';
      document.getElementById('filter-industry').value = '';
      renderJobs();

    function updateRecentActivity(activity) {
      const activityContainer = document.getElementById('recent-activity');
      const newActivity = document.createElement('p');
      newActivity.innerHTML = `<span class="font-semibold">${activity.split(':')[0]}:</span> ${activity.split(':')[1]}`;
      activityContainer.insertBefore(newActivity, activityContainer.firstChild);
    }

    function openJobModal(company, position, major, location, salary, benefit, description, requirements) {
      const modal = document.getElementById('deal-modal');
      document.getElementById('modal-title').textContent = company;
      document.getElementById('modal-position').textContent = position;
      document.getElementById('modal-major').innerHTML = `<span class="font-semibold">Preferred Major:</span> ${major}`;
      document.getElementById('modal-location').innerHTML = `<span class="font-semibold">Location:</span> ${location}`;
      document.getElementById('modal-compensation').innerHTML = `<span class="font-semibold">Salary Range:</span> ${salary}`;
      document.getElementById('modal-benefit').innerHTML = `<span class="font-semibold">Career Benefit:</span> ${benefit}`;
      document.getElementById('modal-description').innerHTML = `<span class="font-semibold">Job Description:</span> ${description}`;
      document.getElementById('modal-requirements').innerHTML = `<span class="font-semibold">Requirements:</span> ${requirements}`;
      const applyButton = document.getElementById('modal-apply-now');
      applyButton.setAttribute('onclick', `applyForJob('${company}', '${position}')`);
      const requestButton = document.getElementById('modal-request-info');
      requestButton.setAttribute('onclick', `requestJobInfo('${company}', '${position}')`);
      modal.style.display = 'flex';
    }

    function openInternshipModal(company, position, major, location, compensation, benefit, description, requirements) {
      const modal = document.getElementById('deal-modal');
      document.getElementById('modal-title').textContent = company;
      document.getElementById('modal-position').textContent = position;
      document.getElementById('modal-major').innerHTML = `<span class="font-semibold">Preferred Major:</span> ${major}`;
      document.getElementById('modal-location').innerHTML = `<span class="font-semibold">Location:</span> ${location}`;
      document.getElementById('modal-compensation').innerHTML = `<span class="font-semibold">Compensation:</span> ${compensation}`;
      document.getElementById('modal-benefit').innerHTML = `<span class="font-semibold">Career Benefit:</span> ${benefit}`;
      document.getElementById('modal-description').innerHTML = `<span class="font-semibold">Description:</span> ${description}`;
      document.getElementById('modal-requirements').innerHTML = `<span class="font-semibold">Requirements:</span> ${requirements}`;
      const applyButton = document.getElementById('modal-apply-now');
      applyButton.setAttribute('onclick', `applyForInternship('${company}', '${position}')`);
      const requestButton = document.getElementById('modal-request-info');
      requestButton.setAttribute('onclick', `requestInternshipInfo('${company}', '${position}')`);
      modal.style.display = 'flex';
    }

    function openNILModal(company, deal, compensation, description, requirements) {
      const modal = document.getElementById('deal-modal');
      document.getElementById('modal-title').textContent = company;
      document.getElementById('modal-position').textContent = deal;
      document.getElementById('modal-major').innerHTML = '';
      document.getElementById('modal-location').innerHTML = '';
      document.getElementById('modal-compensation').innerHTML = `<span class="font-semibold">Compensation:</span> ${compensation}`;
      document.getElementById('modal-benefit').innerHTML = '';
      document.getElementById('modal-description').innerHTML = `<span class="font-semibold">Description:</span> ${description}`;
      document.getElementById('modal-requirements').innerHTML = `<span class="font-semibold">Requirements:</span> ${requirements}`;
      const applyButton = document.getElementById('modal-apply-now');
      applyButton.setAttribute('onclick', `applyForNIL('${company}', '${deal}')`);
      const requestButton = document.getElementById('modal-request-info');
      requestButton.setAttribute('onclick', `requestNILInfo('${company}', '${deal}')`);
      modal.style.display = 'flex';
    }

    function closeModal() {
      const modal = document.getElementById('deal-modal');
      modal.style.display = 'none';
    }

    function applyForJob(company, position) {
      alert(`Application submitted for ${position} at ${company}!`);
      updateRecentActivity(`Applied: ${company}, ${position} – ${new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`);
      closeModal();
    }

    function applyForInternship(company, position) {
      alert(`Application submitted for ${position} at ${company}!`);
      updateRecentActivity(`Applied for Internship: ${company}, ${position} – ${new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`);
      closeModal();
    }

    function applyForNIL(company, deal) {
      alert(`Application submitted for ${deal} at ${company}!`);
      updateRecentActivity(`Applied for NIL Deal: ${company}, ${deal} – ${new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`);
      closeModal();
    }

    function requestJobInfo(company, position) {
      alert(`Request for more information about ${position} at ${company} sent!`);
      closeModal();
    }

    function requestInternshipInfo(company, position) {
      alert(`Request for more information about ${position} at ${company} sent!`);
      closeModal();
    }

    function requestNILInfo(company, deal) {
      alert(`Request for more information about ${deal} at ${company} sent!`);
      closeModal();
    }

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
      const page = document.getElementById(pageId);
      if (page) {
        page.classList.add('active');
        if (pageId === 'alumni') {
          renderAlumni();
        } else if (pageId === 'jobs') {
          renderJobs();
        } else if (pageId === 'internships') {
          renderInternships();
        }
      } else {
        console.error(`Page with ID ${pageId} not found`);
      }
    }

    showPage('home');
  </script>
</body>
</html>
